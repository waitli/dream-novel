# Cloudflare Pages 配置
# 文档：https://developers.cloudflare.com/pages/

name = "dream-novel"
compatibility_date = "2024-01-01"

# Pages 构建配置
[build]
command = "npm run build"
# 注意：Pages 使用 dist 目录，不需要 pages_build_output_dir
# 该属性仅用于 Workers Sites

# 环境变量（非敏感配置，敏感信息在 Dashboard 设置）
[vars]
APP_NAME = "AI 小说生成器"
